components:
  schemas:
    AddFileRequest:
      required:
        - commonName
        - externalId
        - issuedTo
        - vpnServerId
      type: object
      properties:
        externalId:
          minLength: 1
          type: string
        commonName:
          minLength: 1
          type: string
        vpnServerId:
          maximum: 2147483647
          minimum: 1
          type: integer
          format: int32
        issuedTo:
          minLength: 1
          type: string
        ovpnFileExpireDays:
          type: integer
          format: int32
      additionalProperties: false
    AddMessageRequest:
      type: object
      properties:
        message:
          $ref: '#/components/schemas/MessageDto'
      additionalProperties: false
    AddMessageResponse:
      type: object
      properties:
        message:
          $ref: '#/components/schemas/MessageDto'
      additionalProperties: false
    AddMessageResponseApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        data:
          $ref: '#/components/schemas/AddMessageResponse'
      additionalProperties: false
    AddOrUpdateOvpnFileConfigRequest:
      required:
        - vpnServerId
        - vpnServerIp
      type: object
      properties:
        vpnServerId:
          maximum: 2147483647
          minimum: 1
          type: integer
          format: int32
        vpnServerIp:
          minLength: 1
          type: string
        vpnServerPort:
          type: integer
          format: int32
        configTemplate:
          type: string
          nullable: true
      additionalProperties: false
    AddServerRequest:
      required:
        - serverName
      type: object
      properties:
        serverName:
          minLength: 1
